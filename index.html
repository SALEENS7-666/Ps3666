<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PS3 File Transfer Portal</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #e2e2e2;
            font-family: "Segoe UI", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #162447;
            border: 2px solid #0f4c81;
            border-radius: 8px;
            padding: 20px;
        }
        h1 {
            color: #00adb5;
            font-size: 20pt;
            margin-bottom: 5px;
        }
        p {
            font-size: 11pt;
            color: #b5b5b5;
            margin-bottom: 25px;
        }
        .file-card {
            background-color: #1f4068;
            border-radius: 6px;
            padding: 15px;
            margin: 15px auto;
            width: 85%;
            border: 1px solid #00adb5;
        }
        .file-icon {
            font-size: 40pt;
            color: #00adb5;
            margin-bottom: 10px;
        }
        .file-name {
            font-size: 13pt;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 15px;
            word-wrap: break-word;
        }
        .btn-download {
            display: inline-block;
            background-color: #00adb5;
            color: #ffffff;
            font-size: 14pt;
            font-weight: bold;
            text-decoration: none;
            padding: 12px 35px;
            border-radius: 4px;
            border-bottom: 4px solid #00828a;
        }
        .btn-download:hover {
            background-color: #00c2cc;
        }
        .footer-note {
            font-size: 9pt;
            color: #6a7b9c;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>بوابة نقل الملفات للـ PS3</h1>
        <p>اضغط على زر التحميل أدناه لحفظ الملف مباشرة على السوني</p>
        
        <div class="file-card">
            <div class="file-icon">💾</div>
            
            <div class="file-name">ملف نقل البيانات الجاهز</div>
            
            <a href="your_file_name.pkg" class="btn-download" download>تـحـمـيـل (Download)</a>
        </div>
        
        <div class="footer-note">
            ملاحظة: تأكد من وضع هذا الملف في نفس المجلد مع الملفات التي تود تحميلها.
        </div>
    </div>

</body>
</html>
